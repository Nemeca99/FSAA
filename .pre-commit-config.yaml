# See https://pre-commit.com
# When this repo is cloned as github.com/.../FSAA, git root is this tree (not a monorepo).
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(src|tests|scripts)/
      - id: ruff-format
        files: ^(src|tests|scripts)/
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies: [jsonschema>=4.22]
        files: ^src/fsaa/(contracts|config)/
        pass_filenames: false
        args:
          - --config-file
          - pyproject.toml
          - -p
          - fsaa.contracts
          - -p
          - fsaa.config
  - repo: local
    hooks:
      - id: verify-no-literals
        name: verify-no-literals
        entry: python scripts/verify_no_literals.py
        language: system
        pass_filenames: false
      - id: verify-terminology
        name: verify-terminology
        entry: python scripts/verify_terminology.py
        language: system
        pass_filenames: false
