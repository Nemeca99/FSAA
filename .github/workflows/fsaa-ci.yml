# TODO Beta: SHA-pin GitHub Actions by commit digest for supply-chain audit.
name: FSAA CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: .

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Pre-commit
        run: pre-commit run --all-files
      # Match tests/conftest.py: workspace = parent of repo root (sibling layout).
      - name: fsaa validate-policy
        run: fsaa validate-policy
        env:
          WORKSPACE_ROOT: ${{ github.workspace }}/..
      - name: fsaa verify
        run: fsaa verify
        env:
          WORKSPACE_ROOT: ${{ github.workspace }}/..
      - name: CycloneDX SBOM (Python)
        run: pip install cyclonedx-bom && cyclonedx-py environment -o sbom.json
      - uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-sbom
          path: sbom.json
