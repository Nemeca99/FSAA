# TODO Beta: SHA-pin GitHub Actions by commit digest for supply-chain audit.
name: FSAA CI

on:
  push:
    paths:
      - "Continue/FSAA_v2/**"
  pull_request:
    paths:
      - "Continue/FSAA_v2/**"

defaults:
  run:
    working-directory: Continue/FSAA_v2

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Pre-commit
        run: pre-commit run --all-files || true
      - name: Workspace env
        run: echo "WORKSPACE_ROOT=${GITHUB_WORKSPACE}/Continue" >> $GITHUB_ENV
      - name: fsaa validate-policy
        run: fsaa validate-policy
        env:
          WORKSPACE_ROOT: ${{ github.workspace }}/Continue
      - name: fsaa verify
        run: fsaa verify
        env:
          WORKSPACE_ROOT: ${{ github.workspace }}/Continue
      - name: CycloneDX SBOM (Python)
        run: pip install cyclonedx-bom && cyclonedx-py environment -o sbom.json
      - uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-sbom
          path: Continue/FSAA_v2/sbom.json
